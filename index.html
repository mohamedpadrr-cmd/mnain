<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد الاحترافية 4K</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-screen">
        <div class="overlay"></div>
        
        <div class="content">
            <!-- الوقت والتاريخ -->
            <div class="header-section">
                <div id="clock" class="clock-display">00:00:00</div>
                <div id="ampm" class="ampm-label">--</div>
                <div id="full-date" class="date-display">جاري تحميل التاريخ...</div>
            </div>

            <div class="next-prayer-title">الصلاة القادمة</div>

            <!-- شبكة الصلوات السداسية -->
            <div class="hex-container">
                <div class="hex" id="fajr"><span>الفجر</span><p>00:00</p></div>
                <div class="hex" id="sunrise"><span>الشروق</span><p>00:00</p></div>
                <div class="hex" id="dhuhr"><span>الظهر</span><p>00:00</p></div>
                <div class="hex active" id="asr"><span>العصر</span><p>00:00</p></div>
                <div class="hex" id="maghrib"><span>المغرب</span><p>00:00</p></div>
                <div class="hex" id="isha"><span>العشاء</span><p>00:00</p></div>
            </div>

            <!-- شريط الأذكار -->
            <div class="footer-ticker">
                <marquee scrollamount="8">
                    • سبحان الله وبحمده، سبحان الله العظيم • يرجى إغلاق الهواتف المحمولة • أقم صلاتك قبل مماتك •
                </marquee>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
